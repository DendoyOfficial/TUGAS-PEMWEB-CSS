<body class="form">
        <header class = "kepala">
        <table class = "head">
        <tr>
            <td>
            <h1 class="heading">HALO</h1>
            </td>

            <td class="heading">
            <a href="form.html">Testimoni</a>
            <a href="index (1).html">About</a>
            <a href="#">Contact</a>
            </td>

            <td class="icon">
            <img src="img/instagram-brands-solid-full.svg" alt="instagram" class="icon">
            <img src="img/envelope-solid-full.svg" alt="Email" class="icon">
            </td>
        </tr>
        </table>
    </header>

    <section class="gambar-aja">
        <form action="" class="formulir">

            <label for="nama" class="form-label">Nama</label><br>
            <input type="text" name="nama" class="form-input" id="nama" required placeholder="Masukkan nama"  size="60px"><br>
            <br>

            <label for="tanggal_lahir" class="form-label" >Tanggal Lahir</label><br>
            <input type="date" name="tanggal_lahir" id="tanggal_lahir" class="form-input" size="60px"><br>
            <br>

            <label for="jenis_kelamin"class="form-label">Jenis Kelamin</label><br>
            <input type="radio" name="gender" id="Pria" value="Pria" >
            <label for="Pria">Men</label>
            <input type="radio" name="gender" id="Wanita" value="Wanita">
            <label for="Wanita">Woman</label><br>
            <br>

            <label for="alamat" class="form-label">Alamat</label><br>
            <select name="kota" id="alamat" class="form-input">
                <option value="">--pilih alamat--</option>
                <option value="Mataram">Mataram</option>
                <option value="Narmada">Narmada</option>
                <option value="Kediri">Kediri</option>
            </select><br>

            <br>
            <label for="email" class="form-label">E-mail</label><br>
            <input type="email" name="email" id="email" required placeholder="Masukkan email" class="form-input"><br>
            <br>

            <label for="pesan" >Pesan</label><br>
            <textarea name="pesan" id="pesan" rows="5" cols="50" required placeholder="Masukkan pesan" class="form-input"></textarea>
            <br>
            <br>

            <button type="submit" class="tombol">Kirim</button>
            <button type="reset" class="tombol">Reset</button>

        </form>

        <div class="flower">
            <img src="img/download (15).jpg" alt="flower">
        </div>
    </section>
